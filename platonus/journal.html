<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Журнал успеваемости — Platonus</title>
  <link rel="stylesheet" href="css/platonus.css" />
</head>
<body>
  <header class="top-header top-header--journal">
    <div class="top-header__left">
      <div class="top-header__logo-mini">P</div>
      <nav class="breadcrumbs" aria-label="Навигация">
        <a href="index.html">Главная</a> / <span>Журнал успеваемости Кожабек Бахытжан Даниярулы</span>
      </nav>
    </div>
    <button type="button" class="btn-sitemap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Карта сайта
    </button>
    <span class="lang-switch"><span class="active">RU</span></span>
    <div class="header-icons">
      <span class="header-icon" title="Уведомления">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7M13.7 21a2 2 0 01-3.4 0"/></svg>
        <span class="notif-badge">131</span>
      </span>
      <span class="header-icon" title="Сообщения">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </span>
      <span class="header-icon user-avatar-wrap" style="cursor:default">
        <img class="user-avatar" data-avatar src="../assets/user-avatar.png" alt="" width="32" height="32" />
      </span>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar__logo">
      <div class="logo-mark">
        <div class="logo-mark__icon">P</div>
        <span class="logo-mark__text">PLATONUS</span>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__btn" title="Главная">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      </a>
      <button type="button" class="sidebar__btn active" title="Журнал">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </button>
      <button type="button" class="sidebar__btn" title="Люди">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      </button>
      <button type="button" class="sidebar__btn" title="График">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      </button>
      <button type="button" class="sidebar__btn" title="Настройки">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2"/></svg>
      </button>
      <button type="button" class="sidebar__btn" title="Сетка">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
    </nav>
  </aside>

  <main class="journal-page">
    <div class="journal-filters">
      <div>
        <label for="year">Учебный год</label>
        <select id="year" disabled>
          <option selected>2023-2024</option>
        </select>
      </div>
      <div>
        <label for="period">Академический период</label>
        <select id="period" disabled>
          <option selected>2</option>
        </select>
      </div>
    </div>

    <div class="journal-table-wrap" id="journalTableRoot"></div>

    <div class="journal-legend">
      <span class="legend-item"><span class="legend-swatch legend-swatch--gray"></span> — Не предусмотрено (н/п)</span>
      <span class="legend-item"><span class="legend-swatch legend-swatch--green"></span> — Доступно для редактирования</span>
    </div>
  </main>

  <footer class="site-footer">
    ©Platonus v6.26.4 (build# 23), 2006-2026 <span class="brand">Platonus</span>
  </footer>

  <script src="js/journal-data.js"></script>
  <script src="js/platonus.js"></script>
</body>
</html>
